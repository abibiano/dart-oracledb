name: CI

on:
  push:
    branches: [main]
  pull_request:

# Avoid wasted CI cycles when force-pushing or pushing rapid follow-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Linux: analyze + unit tests with coverage.
  quality:
    name: Analyze & Unit Tests (Linux + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting / analyzer (zero warnings)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run non-integration tests with coverage
        run: dart test --exclude-tags=integration --coverage-path=./coverage/lcov.info

      # Coverage gate (Story 7.9 AC9). Authoritative — runs before and
      # independent of the Codecov upload. Threshold is a no-regression
      # floor set just below the measured unit-test baseline (68.89% on
      # 2026-06-10); integration-tagged tests are excluded from coverage,
      # so the protocol paths they exercise don't count here. Ratchet the
      # floor upward as unit coverage grows.
      - name: Enforce coverage gate (line coverage floor)
        run: |
          set -eu
          threshold=68
          total=$(awk -F: '/^LF:/ {lf += $2} /^LH:/ {lh += $2} END { if (lf == 0) print "no-data"; else printf "%.2f", (lh / lf) * 100 }' coverage/lcov.info)
          if [ "$total" = "no-data" ]; then
            echo "::error::Coverage gate: no LF records found in coverage/lcov.info"
            exit 1
          fi
          echo "Total line coverage: ${total}% (floor: ${threshold}%)"
          if ! awk -v t="$total" -v th="$threshold" 'BEGIN { exit (t+0 >= th+0) ? 0 : 1 }'; then
            echo "::error::Line coverage ${total}% is below the ${threshold}% floor"
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        # Codecov tokenless / OIDC works for repo pushes and same-repo PRs.
        # Fork PRs intentionally skipped: artifact upload above is sufficient
        # and avoids requiring secrets for external contributors.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: false

  # Cross-platform validation for analyzer + unit tests.
  # Oracle integration is intentionally Linux-only (separate job below).
  #
  # Linux is deliberately ABSENT from this matrix (Story 7.8 AC16): the
  # `quality` job above already runs the identical analyzer + unit-test
  # surface on ubuntu-latest (plus coverage), so adding Linux here would
  # only duplicate that run. The matrix therefore covers exactly the
  # platforms not exercised elsewhere: macOS and Windows.
  platform:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # No analyzer step here (Story 7.9 AC8): analyzer output is
      # platform-independent and the `quality` job already enforces it.
      - name: Run non-integration tests
        run: dart test --exclude-tags=integration

  # Oracle 23ai Free service container — Linux only.
  # Mirrors local docker-compose: image, ORACLE_PWD, FREEPDB1 service,
  # and host port 1521. Integration tests in this repo currently
  # hardcode localhost:1521/FREEPDB1 with system/testpassword, so the
  # service container must expose the same surface.
  integration:
    name: Oracle 23ai Integration Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      oracle:
        image: container-registry.oracle.com/database/free:latest
        credentials:
          username: ${{ secrets.ORACLE_REGISTRY_USER }}
          password: ${{ secrets.ORACLE_REGISTRY_PASSWORD }}
        env:
          ORACLE_PWD: testpassword
        ports:
          - 1521:1521
        # The image ships its own HEALTHCHECK (/opt/oracle/checkDBStatus.sh).
        # We only override the timing: start_period=600s to account for Oracle
        # 23ai Free cold-start latency on GitHub Actions (~8-10 min); retries
        # keep polling for up to 500s after the start period ends.
        options: >-
          --health-interval 20s
          --health-timeout 15s
          --health-retries 25
          --health-start-period 600s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Even though `services:` waits for the container healthcheck before
      # starting steps, we add a bounded readiness probe so logs clearly show
      # the failure mode (container vs. listener vs. PDB) if Oracle never
      # becomes ready. The probe requires a real DB session on FREEPDB1 via
      # in-container sqlplus (Story 7.9 AC4) — a TCP-up listener with a
      # still-mounting PDB (ORA-12514) is not "ready". Total budget
      # (60 × ~10s ≈ 10 min worst case) stays under timeout-minutes: 30 (AC5).
      - name: Wait for Oracle readiness on localhost:1521 (listener + FREEPDB1 session)
        run: |
          set -eu
          # `services:` containers get auto-generated names — derive the id
          # from the image (Story 7.9 AC7). Re-derive inside the loop: the
          # container may not be listed when the step starts, and a one-shot
          # empty id would make the [ -n "$cid" ] session probe never succeed,
          # silently looping to the full timeout even on a healthy DB.
          image="container-registry.oracle.com/database/free:latest"
          attempts=60
          for i in $(seq 1 $attempts); do
            cid="$(docker ps --filter "ancestor=${image}" -q | head -n1)"
            if bash -c "cat < /dev/tcp/localhost/1521" >/dev/null 2>&1; then
              # Listener is up — now require an actual session on FREEPDB1.
              # Credential is the ephemeral CI-only password (see test-run env).
              if [ -n "$cid" ] && echo 'SELECT 1 FROM dual;' | docker exec -i "$cid" sqlplus -L -S system/testpassword@//localhost:1521/FREEPDB1 >/dev/null 2>&1; then
                echo "Oracle ready: DB session on FREEPDB1 established (after ${i} attempts)"
                exit 0
              fi
              if [ -z "$cid" ]; then
                echo "Listener up but no container matched ancestor=${image} yet (attempt ${i}/${attempts})..."
              else
                echo "Listener up but FREEPDB1 not accepting sessions yet (attempt ${i}/${attempts})..."
              fi
            else
              echo "Oracle not ready yet (attempt ${i}/${attempts})..."
            fi
            sleep 10
          done
          echo "::error::Oracle did not become ready within timeout"
          # Surface service-container startup logs (Story 7.9 AC7).
          if [ -n "$cid" ]; then
            docker logs "$cid" 2>&1 | tail -n 200 || true
          else
            echo "::error::No container matched ancestor=${image}; cannot show logs. All containers:"
            docker ps -a || true
          fi
          exit 1

      - name: Run integration tests (Oracle-backed)
        env:
          RUN_INTEGRATION_TESTS: 'true'
          ORACLE_HOST: localhost
          ORACLE_PORT: '1521'
          ORACLE_SERVICE: FREEPDB1
          ORACLE_USER: system
          # Matches docker-compose.yml and hardcoded tests; not a secret
          # since it only protects an ephemeral CI database instance.
          ORACLE_PASSWORD: testpassword
        run: dart test --tags=integration --reporter=expanded

  # Pre-23 Oracle XE for non-23ai protocol-path validation (gvenzl community
  # image — no registry credentials required). Originally specced as
  # gvenzl/oracle-xe:19, but that tag does not exist on Docker Hub
  # (gvenzl/oracle-xe ships 21c/18c/11g only). 21c is the closest available
  # image and exercises the same pre-23 code path 19c would.
  integration-21c:
    name: Oracle 21c Integration Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      oracle:
        image: gvenzl/oracle-xe:21
        env:
          ORACLE_PASSWORD: testpassword
        ports:
          - 1521:1521
        # The literal password in --health-cmd is a deliberate trade-off
        # (Story 7.9 AC6): GitHub `services:` options cannot reference step
        # env or secrets, and the credential only protects an ephemeral
        # CI-only database that is destroyed with the job (same rationale as
        # the ORACLE_PASSWORD env comment below).
        options: >-
          --health-cmd "sqlplus -L system/testpassword@//localhost:1521/XEPDB1 @/dev/null"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 300s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Bounded readiness probe requiring a real DB session on XEPDB1 via
      # in-container sqlplus (Story 7.9 AC4) — a TCP-up listener with a
      # still-mounting PDB (ORA-12514) is not "ready". Total budget
      # (60 × ~10s ≈ 10 min worst case) stays under timeout-minutes: 20 (AC5).
      - name: Wait for Oracle 21c readiness on localhost:1521 (listener + XEPDB1 session)
        run: |
          set -eu
          # `services:` containers get auto-generated names — derive the id
          # from the image (Story 7.9 AC7). Re-derive inside the loop: the
          # container may not be listed when the step starts, and a one-shot
          # empty id would make the [ -n "$cid" ] session probe never succeed,
          # silently looping to the full timeout even on a healthy DB.
          image="gvenzl/oracle-xe:21"
          attempts=60
          for i in $(seq 1 $attempts); do
            cid="$(docker ps --filter "ancestor=${image}" -q | head -n1)"
            if bash -c "cat < /dev/tcp/localhost/1521" >/dev/null 2>&1; then
              # Listener is up — now require an actual session on XEPDB1.
              # Credential is the ephemeral CI-only password (see test-run env).
              if [ -n "$cid" ] && echo 'SELECT 1 FROM dual;' | docker exec -i "$cid" sqlplus -L -S system/testpassword@//localhost:1521/XEPDB1 >/dev/null 2>&1; then
                echo "Oracle 21c ready: DB session on XEPDB1 established (after ${i} attempts)"
                exit 0
              fi
              if [ -z "$cid" ]; then
                echo "Listener up but no container matched ancestor=${image} yet (attempt ${i}/${attempts})..."
              else
                echo "Listener up but XEPDB1 not accepting sessions yet (attempt ${i}/${attempts})..."
              fi
            else
              echo "Oracle 21c not ready yet (attempt ${i}/${attempts})..."
            fi
            sleep 10
          done
          echo "::error::Oracle 21c did not become ready within timeout"
          # Surface service-container startup logs (Story 7.9 AC7).
          if [ -n "$cid" ]; then
            docker logs "$cid" 2>&1 | tail -n 200 || true
          else
            echo "::error::No container matched ancestor=${image}; cannot show logs. All containers:"
            docker ps -a || true
          fi
          exit 1

      - name: Run integration tests (Oracle 21c)
        env:
          RUN_INTEGRATION_TESTS: 'true'
          ORACLE_HOST: localhost
          ORACLE_PORT: '1521'
          ORACLE_SERVICE: XEPDB1
          ORACLE_USER: system
          ORACLE_PASSWORD: testpassword
        run: dart test --tags=integration --reporter=expanded
