name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the non-AL32UTF8 charset fixture job (see
  # integration-non-al32utf8 below). It is intentionally NOT a push/PR check.
  workflow_dispatch:

# Avoid wasted CI cycles when force-pushing or pushing rapid follow-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Linux: analyze + unit tests with coverage.
  quality:
    name: Analyze & Unit Tests (Linux + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting / analyzer (zero warnings)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Verify README version references
        run: scripts/sync_readme_version.sh --check

      # Verify that the platforms declared in pubspec.yaml (including android
      # and ios) match the package's actual API surface. pana is the same
      # static analyser pub.dev uses to score packages. --no-dartdoc skips
      # documentation generation (slow, irrelevant here). No --exit-code-threshold
      # flag: pana defaults to exit 0, making this step informational — the
      # platform-support section is visible in the CI log without failing the
      # job on unrelated score factors (e.g. pre-existing formatting deductions).
      - name: pana platform-compatibility check
        run: |
          dart pub global activate pana 0.23.12
          dart pub global run pana . --no-dartdoc

      - name: Run non-integration tests with coverage
        run: dart test --exclude-tags=integration --coverage-path=./coverage/lcov.info

      # Coverage gate (Story 7.9 AC9). Authoritative — runs before and
      # independent of the Codecov upload. Threshold is a no-regression
      # floor set just below the measured unit-test baseline (68.89% on
      # 2026-06-10); integration-tagged tests are excluded from coverage,
      # so the protocol paths they exercise don't count here. Ratchet the
      # floor upward as unit coverage grows.
      - name: Enforce coverage gate (line coverage floor)
        run: |
          set -eu
          threshold=68
          total=$(awk -F: '/^LF:/ {lf += $2} /^LH:/ {lh += $2} END { if (lf == 0) print "no-data"; else printf "%.2f", (lh / lf) * 100 }' coverage/lcov.info)
          if [ "$total" = "no-data" ]; then
            echo "::error::Coverage gate: no LF records found in coverage/lcov.info"
            exit 1
          fi
          echo "Total line coverage: ${total}% (floor: ${threshold}%)"
          if ! awk -v t="$total" -v th="$threshold" 'BEGIN { exit (t+0 >= th+0) ? 0 : 1 }'; then
            echo "::error::Line coverage ${total}% is below the ${threshold}% floor"
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        # Codecov tokenless / OIDC works for repo pushes and same-repo PRs.
        # Fork PRs intentionally skipped: artifact upload above is sufficient
        # and avoids requiring secrets for external contributors.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: false

  # Cross-platform validation for analyzer + unit tests.
  # Oracle integration is intentionally Linux-only (separate job below).
  #
  # Linux is deliberately ABSENT from this matrix (Story 7.8 AC16): the
  # `quality` job above already runs the identical analyzer + unit-test
  # surface on ubuntu-latest (plus coverage), so adding Linux here would
  # only duplicate that run. The matrix therefore covers exactly the
  # platforms not exercised elsewhere: macOS and Windows.
  platform:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # No analyzer step here (Story 7.9 AC8): analyzer output is
      # platform-independent and the `quality` job already enforces it.
      - name: Run non-integration tests
        run: dart test --exclude-tags=integration

  # Oracle 23ai Free service container — Linux only.
  # Mirrors local docker-compose: image, ORACLE_PWD, FREEPDB1 service,
  # and host port 1521. Integration tests in this repo currently
  # hardcode localhost:1521/FREEPDB1 with system/testpassword, so the
  # service container must expose the same surface.
  integration:
    name: Oracle 23ai Integration Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      oracle:
        image: container-registry.oracle.com/database/free:latest
        credentials:
          username: ${{ secrets.ORACLE_REGISTRY_USER }}
          password: ${{ secrets.ORACLE_REGISTRY_PASSWORD }}
        env:
          ORACLE_PWD: testpassword
        ports:
          - 1521:1521
        # The image ships its own HEALTHCHECK (/opt/oracle/checkDBStatus.sh).
        # We only override the timing: start_period=600s to account for Oracle
        # 23ai Free cold-start latency on GitHub Actions (~8-10 min); retries
        # keep polling for up to 500s after the start period ends.
        options: >-
          --health-interval 20s
          --health-timeout 15s
          --health-retries 25
          --health-start-period 600s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Bounded readiness probe shared with the 21c job (F13 dedup) — see
      # scripts/ci_wait_for_oracle.sh for the full rationale (Story 7.9
      # AC4/AC5/AC7). Logs clearly show the failure mode (container vs.
      # listener vs. PDB) if Oracle never becomes ready.
      - name: Wait for Oracle readiness on localhost:1521 (listener + FREEPDB1 session)
        run: scripts/ci_wait_for_oracle.sh "container-registry.oracle.com/database/free:latest" "FREEPDB1" "Oracle"

      - name: Run integration tests (Oracle-backed)
        env:
          RUN_INTEGRATION_TESTS: 'true'
          ORACLE_HOST: localhost
          ORACLE_PORT: '1521'
          ORACLE_SERVICE: FREEPDB1
          ORACLE_USER: system
          # Matches docker-compose.yml and hardcoded tests; not a secret
          # since it only protects an ephemeral CI database instance.
          ORACLE_PASSWORD: testpassword
        run: dart test --tags=integration --reporter=expanded

  # Pre-23 Oracle XE for non-23ai protocol-path validation (gvenzl community
  # image — no registry credentials required). Originally specced as
  # gvenzl/oracle-xe:19, but that tag does not exist on Docker Hub
  # (gvenzl/oracle-xe ships 21c/18c/11g only). 21c is the closest available
  # image and exercises the same pre-23 code path 19c would.
  integration-21c:
    name: Oracle 21c Integration Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      oracle:
        image: gvenzl/oracle-xe:21
        env:
          ORACLE_PASSWORD: testpassword
        ports:
          - 1521:1521
        # The literal password in --health-cmd is a deliberate trade-off
        # (Story 7.9 AC6): GitHub `services:` options cannot reference step
        # env or secrets, and the credential only protects an ephemeral
        # CI-only database that is destroyed with the job (same rationale as
        # the ORACLE_PASSWORD env comment below).
        options: >-
          --health-cmd "sqlplus -L system/testpassword@//localhost:1521/XEPDB1 @/dev/null"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 300s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Bounded readiness probe shared with the 23ai job (F13 dedup) — see
      # scripts/ci_wait_for_oracle.sh for the full rationale (Story 7.9
      # AC4/AC5/AC7). Logs clearly show the failure mode (container vs.
      # listener vs. PDB) if Oracle never becomes ready.
      - name: Wait for Oracle 21c readiness on localhost:1521 (listener + XEPDB1 session)
        run: scripts/ci_wait_for_oracle.sh "gvenzl/oracle-xe:21" "XEPDB1" "Oracle 21c"

      - name: Run integration tests (Oracle 21c)
        env:
          RUN_INTEGRATION_TESTS: 'true'
          ORACLE_HOST: localhost
          ORACLE_PORT: '1521'
          ORACLE_SERVICE: XEPDB1
          ORACLE_USER: system
          ORACLE_PASSWORD: testpassword
        run: dart test --tags=integration --reporter=expanded

  # Non-AL32UTF8 (WE8MSWIN1252) database character-set fixture — MANUAL ONLY.
  #
  # GATED to `workflow_dispatch` on purpose (Story 10.5 AC3; architecture
  # "Validation" note: "Gate it if it can't be made reliable, and document the
  # gap rather than silently skipping"). The gvenzl/oracle-free cold start PLUS
  # the in-PDB CSALTER charset migration is slower and less proven on GitHub
  # Actions than the AL32UTF8 service jobs, so this is NOT a blocking push/PR
  # check. Run it on demand from the Actions tab; promote it to a required check
  # only once it proves consistently green inside the timeout.
  #
  # WHY a `docker run` step instead of a `services:` block: GitHub `services:`
  # containers start BEFORE `actions/checkout` and cannot bind-mount repo files,
  # but this fixture's whole point is the init SQL (non_al32utf8_setup.sql) that
  # creates and migrates the we8pdb1 PDB down to WE8MSWIN1252. So the container
  # is launched with `docker run -v` AFTER checkout.
  #
  # This job can NEVER silently pass: the wait step asserts the live charset is
  # WE8MSWIN1252, and the suite's own guard (Story 10.3 AC1) hard-fails if it is
  # ever pointed at an AL32UTF8 database.
  integration-non-al32utf8:
    name: Non-AL32UTF8 Charset Fixture (WE8MSWIN1252, manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # gvenzl/oracle-free is a public, multi-arch community image (no registry
      # credentials). The init SQL is bind-mounted into the first-boot init dir,
      # exactly like the local `non-al32utf8` docker-compose profile.
      #
      # Tag pinned to the 23 major version (the Oracle Free 23ai line validated
      # locally — the running fixture reports 23.26.x) rather than the floating
      # `:latest`, mirroring the integration-21c job's pinned `gvenzl/oracle-xe:21`
      # so a new Oracle Free release can never silently change first-boot/CSALTER
      # init behavior under this job. `-slim` is the lighter CI variant (omits the
      # bundled sample schemas this fixture does not need); it is multi-arch and
      # shares the same `/container-entrypoint-initdb.d` first-boot init path.
      # HOST PORT 1523 (not 1521) is deliberate: the standard `integration` and
      # `integration-21c` jobs both publish host port 1521. This job is manual
      # (workflow_dispatch) and GitHub-hosted runners are one-job-per-VM, so a
      # 1521 collision is not reachable today — but binding 1523 here (matching
      # the local docker-compose `oracle-non-al32` service and test_helper.dart's
      # ORACLE_NON_AL32UTF8_PORT default) removes the latent conflict for good and
      # makes this job safe to promote to a required/auto check later. Only the
      # HOST mapping changes: the container's INTERNAL listener stays 1521, so the
      # in-container sqlplus readiness probe below still targets //localhost:1521.
      # The Dart test step is given ORACLE_NON_AL32UTF8_PORT=1523 to match.
      - name: Launch WE8MSWIN1252 fixture (gvenzl/oracle-free + CSALTER init)
        run: |
          docker run -d --name oracle-non-al32 \
            -p 1523:1521 \
            -e ORACLE_PASSWORD=testpassword \
            -v "$PWD/test/integration/fixtures/non_al32utf8_setup.sql:/container-entrypoint-initdb.d/01_we8mswin1252_pdb.sql:ro" \
            gvenzl/oracle-free:23-slim

      # Self-contained readiness loop (not the shared ci_wait_for_oracle.sh):
      # the cold start + charset migration can exceed that script's ~10 min
      # budget, and we additionally want to assert the migrated charset. 50 x
      # 30s = 25 min, comfortably inside timeout-minutes above.
      - name: Wait for we8pdb1 readiness (assert WE8MSWIN1252)
        run: |
          set -euo pipefail
          for i in $(seq 1 50); do
            if echo "SELECT value FROM nls_database_parameters WHERE parameter = 'NLS_CHARACTERSET';" \
                 | docker exec -i oracle-non-al32 sqlplus -S -L "system/testpassword@//localhost:1521/we8pdb1" 2>/dev/null \
                 | grep -q 'WE8MSWIN1252'; then
              echo "we8pdb1 ready with WE8MSWIN1252 charset (after ${i} attempts)"
              exit 0
            fi
            echo "we8pdb1 not ready / not yet migrated (attempt ${i}/50)..."
            sleep 30
          done
          echo "::error::we8pdb1 did not become ready as WE8MSWIN1252 within timeout"
          docker logs oracle-non-al32 2>&1 | tail -n 200 || true
          exit 1

      - name: Run non-AL32UTF8 integration suite (real WE8MSWIN1252 DB)
        env:
          RUN_INTEGRATION_TESTS: 'true'
          RUN_NON_AL32UTF8_TESTS: 'true'
          ORACLE_NON_AL32UTF8_HOST: localhost
          # Matches the published HOST port above (1523). The dart test connects
          # from the runner host (not inside the container), so it must use the
          # host mapping, NOT the container-internal 1521 used by the in-container
          # sqlplus readiness probe. test_helper.dart reads this via
          # ORACLE_NON_AL32UTF8_PORT (nonAl32Port getter; default 1523).
          ORACLE_NON_AL32UTF8_PORT: '1523'
          ORACLE_NON_AL32UTF8_SERVICE: we8pdb1
          ORACLE_NON_AL32UTF8_USER: system
          # Ephemeral CI-only credential (same rationale as the other Oracle
          # jobs): protects a throwaway database destroyed with the job.
          ORACLE_NON_AL32UTF8_PASSWORD: testpassword
        run: dart test test/integration/charset_non_al32utf8_integration_test.dart --reporter=expanded

      - name: Fixture container logs (always)
        if: always()
        run: docker logs oracle-non-al32 2>&1 | tail -n 200 || true
