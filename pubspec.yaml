name: oracledb
description: A pure Dart Oracle Database driver implementing thin-mode TNS/TTC wire protocol. No Oracle Client required.
version: 0.9.0
repository: https://github.com/abibiano/dart-oracledb
issue_tracker: https://github.com/abibiano/dart-oracledb/issues
documentation: https://github.com/abibiano/dart-oracledb#readme

topics:
  - database
  - oracle
  - driver
  - sql

# Supported native platforms. The driver uses dart:io TCP sockets
# (lib/src/transport/socket.dart, tls.dart) — available on all native targets
# including Android and iOS. `web` is deliberately excluded: dart:io is
# unavailable in the browser, and dart2js maps `int` to a double and silently
# loses precision past 2^53, which would corrupt Oracle NUMBER/rowid values.
platforms:
  linux:
  macos:
  windows:
  android:
  ios:

environment:
  sdk: ^3.12.0

dependencies:
  meta: ^1.12.0
  pointycastle: ^4.0.0
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.28.0
