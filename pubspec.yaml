name: oracledb
description: A pure Dart Oracle Database driver implementing thin-mode TNS/TTC wire protocol. No Oracle Client required.
version: 0.1.0-alpha.5
repository: https://github.com/abibiano/dart-oracledb
issue_tracker: https://github.com/abibiano/dart-oracledb/issues
documentation: https://github.com/abibiano/dart-oracledb#readme

topics:
  - database
  - oracle
  - driver
  - sql

# Native desktop/server platforms only. The driver opens raw TCP sockets via
# `dart:io` (lib/src/transport/socket.dart, tls.dart and the auth/fast-auth
# support files), which is unavailable on the web. UB8 reads in
# lib/src/protocol/buffer.dart also rely on native 64-bit integers — dart2js
# maps `int` to a double and silently loses precision past 2^53, which would
# corrupt large Oracle NUMBER/rowid values. `web` is therefore deliberately
# excluded rather than declared and left broken (Story 7.7 AC4). android/ios
# are likewise omitted: they are untested and the transport layer has no mobile
# integration coverage.
platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.3.0

dependencies:
  meta: ^1.12.0
  pointycastle: ^4.0.0
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.28.0
