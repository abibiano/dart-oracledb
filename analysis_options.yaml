# Analysis options following official dart-lang package standards
# Based on: dart-lang/shelf, dart-lang/http patterns
# Reference: https://pub.dev/packages/lints
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat as errors (matching your standard)
    missing_return: error
    must_be_immutable: error
    must_call_super: error
    invalid_use_of_protected_member: error
    parameter_assignments: error
  exclude:
    - "reference/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Official dart-lang commonly used rules (from dart-lang/shelf, dart-lang/http)
    - avoid_unused_constructor_parameters
    - cancel_subscriptions
    - close_sinks
    - literal_only_boolean_expressions
    - missing_whitespace_between_adjacent_strings
    - no_adjacent_strings_in_list
    - no_runtimeType_toString
    - unnecessary_await_in_return

    # Style preferences (matching your standard)
    - avoid_print
    - prefer_single_quotes
    - use_super_parameters

    # Safety & best practices
    - unawaited_futures
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_declarations
